<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>特富野餐廳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { width: 100vw; height: 100vh; background: #0a1408; font-family: 'Noto Serif TC','Heiti TC',serif; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
#bgc { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
#forest { position: absolute; bottom: 0; left: 0; right: 0; height: 42vh; z-index: 1; transition: opacity 1.5s ease, transform 1.5s ease; opacity: 0; transform: translateY(16px); }
.mist { position: absolute; left: -15%; width: 130%; height: 120px; border-radius: 50%; background: radial-gradient(ellipse, rgba(210,200,170,0.1) 0%, transparent 70%); filter: blur(25px); z-index: 2; opacity: 0; transition: opacity 2s ease; }
.m1 { bottom: 26vh; } .m2 { bottom: 18vh; left: -25%; width: 150%; } .m3 { bottom: 10vh; }
#content { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; width: 100%; padding: 0 20px; margin-bottom: 8vh; }
.orn { display: flex; align-items: center; gap: 10px; opacity: 0; transition: opacity 0.8s ease, transform 0.8s ease; transform: translateY(-6px); }
.oln { width: 36px; height: 1px; background: linear-gradient(90deg, transparent, #C9A84C); }
.oln.r { background: linear-gradient(90deg, #C9A84C, transparent); }
.odot { width: 6px; height: 6px; background: #C9A84C; transform: rotate(45deg); box-shadow: 0 0 6px #E8C97A; }
#title { font-size: clamp(2.4rem, 10vw, 3.6rem); font-weight: 300; letter-spacing: 0.28em; color: #F5E6C0; text-shadow: 0 0 35px rgba(201,168,76,0.45), 0 2px 16px rgba(0,0,0,0.9); opacity: 0; transition: opacity 1s ease, transform 1s ease, filter 1s ease; transform: translateY(8px); filter: blur(6px); margin: 6px 0 2px; }
#subtitle { font-size: clamp(0.75rem, 3vw, 0.95rem); font-weight: 300; font-style: italic; letter-spacing: 0.18em; color: #C9A84C; opacity: 0; transition: opacity 0.8s ease, transform 0.8s ease; transform: translateY(8px); margin-bottom: 4px; }
#card { width: 90%; max-width: 350px; background: rgba(16,9,2,0.75); border: 1px solid rgba(201,168,76,0.22); border-radius: 2px; padding: 20px 22px; margin-top: 20px; position: relative; opacity: 0; transition: opacity 0.9s ease, transform 0.9s ease; transform: translateY(12px); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); }
#card::before { content: ''; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px; border-top: 1px solid #C9A84C; border-left: 1px solid #C9A84C; opacity: 0.7; }
#card::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-bottom: 1px solid #C9A84C; border-right: 1px solid #C9A84C; opacity: 0.7; }
.row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(201,168,76,0.08); }
.row:last-child { border-bottom: none; padding-bottom: 0; } .row:first-child { padding-top: 0; }
.ic { width: 18px; text-align: center; font-size: 0.9rem; flex-shrink: 0; }
.tx { font-size: clamp(0.8rem, 3.4vw, 0.92rem); color: #FAF3E0; font-weight: 300; letter-spacing: 0.05em; line-height: 1.5; }
.tx b { font-weight: 400; color: #E8C97A; }
#btns { display: flex; gap: 10px; width: 90%; max-width: 350px; margin-top: 14px; opacity: 0; transition: opacity 0.8s ease, transform 0.8s ease; transform: translateY(10px); }
.btn { flex: 1; padding: 13px 8px; border-radius: 2px; font-family: 'Noto Serif TC','Heiti TC',serif; font-size: clamp(0.8rem, 3.3vw, 0.9rem); letter-spacing: 0.08em; text-decoration: none; text-align: center; display: block; transition: opacity 0.2s; }
.btn:active { opacity: 0.75; }
.bg { background: linear-gradient(135deg, #C9A84C, #A87B2A); color: #1A1208; font-weight: 400; }
.bo { border: 1px solid rgba(201,168,76,0.4); color: #E8C97A; }
#addr { font-size: clamp(0.65rem, 2.8vw, 0.75rem); color: rgba(201,168,76,0.45); letter-spacing: 0.15em; margin-top: 14px; opacity: 0; transition: opacity 0.8s ease; }
</style>
</head>
<body>
<canvas id="bgc"></canvas>
<div class="mist m1" id="ms1"></div>
<div class="mist m2" id="ms2"></div>
<div class="mist m3" id="ms3"></div>
<svg id="forest" viewBox="0 0 390 300" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2e10"/><stop offset="100%" stop-color="#090e08"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1e09"/><stop offset="100%" stop-color="#050905"/></linearGradient>
  </defs>
  <g fill="url(#g2)" opacity="0.65">
    <polygon points="20,290 48,175 76,290"/><polygon points="65,290 96,155 127,290"/><polygon points="115,290 150,172 185,290"/><polygon points="195,290 232,142 269,290"/><polygon points="255,290 290,160 325,290"/><polygon points="308,290 342,158 376,290"/>
    <rect x="0" y="278" width="390" height="22"/>
  </g>
  <g fill="url(#g1)">
    <polygon points="-5,300 28,195 61,300"/><polygon points="38,300 74,180 110,300"/><polygon points="90,300 130,172 170,300"/><polygon points="150,300 194,150 238,300"/><polygon points="215,300 258,168 301,300"/><polygon points="272,300 314,176 356,300"/><polygon points="335,300 372,190 409,300"/>
    <rect x="0" y="288" width="390" height="12" fill="#060c06"/>
  </g>
</svg>
<div id="content">
  <div class="orn" id="o1"><div class="oln"></div><div class="odot"></div><div class="oln r"></div></div>
  <div id="title">特富野餐廳</div>
  <div id="subtitle">Tfuya Indigenous Cuisine</div>
  <div class="orn" id="o2"><div class="oln"></div><div class="odot"></div><div class="oln r"></div></div>
  <div id="card">
    <div class="row"><span class="ic">🏔</span><span class="tx">阿里山　<b>特富野部落</b>　鄒族料理</span></div>
    <div class="row"><span class="ic">🍃</span><span class="tx">風味全餐　<b>每位 $500</b></span></div>
    <div class="row"><span class="ic">📅</span><span class="tx"><b>純預約制</b>　敬請提前聯繫</span></div>
    <div class="row"><span class="ic">📞</span><span class="tx"><b>0965-622-011</b></span></div>
  </div>
  <div id="btns">
    <a class="btn bg" href="tel:0965622011">📞 立即預約</a>
    <a class="btn bo" href="https://line.me/R/ti/p/@744uksmb">💬 LINE 詢問</a>
  </div>
  <div id="addr">嘉義縣阿里山鄉　達邦村特富野220號附1</div>
</div>
<script>
var c=document.getElementById('bgc'),x=c.getContext('2d');
function sz(){c.width=window.innerWidth;c.height=window.innerHeight;}
sz();window.addEventListener('resize',sz);
var stars=[];for(var i=0;i<70;i++)stars.push({px:Math.random(),py:Math.random()*0.55,r:Math.random()*1.1+0.2,a:Math.random()*0.45+0.1,sp:Math.random()*0.018+0.004,of:Math.random()*6.28});
var bugs=[];for(var j=0;j<15;j++)bugs.push({bx:Math.random(),by:0.35+Math.random()*0.45,vx:(Math.random()-0.5)*0.0006,vy:-(Math.random()*0.0004+0.0001),r:Math.random()*1.4+0.4,ma:Math.random()*0.4+0.1,li:Math.random(),sp:Math.random()*0.003+0.001});
var fr=0;
function draw(){
  var W=c.width,H=c.height;
  var sk=x.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,'#05091a');sk.addColorStop(0.3,'#0b1506');sk.addColorStop(0.65,'#162208');sk.addColorStop(1,'#090e06');
  x.fillStyle=sk;x.fillRect(0,0,W,H);
  var mx=W*0.74,my=H*0.14;
  var mg=x.createRadialGradient(mx,my,0,mx,my,100);
  mg.addColorStop(0,'rgba(240,215,150,0.13)');mg.addColorStop(1,'transparent');
  x.fillStyle=mg;x.fillRect(0,0,W,H);
  x.beginPath();x.arc(mx,my,20,0,6.28);
  var mf=x.createRadialGradient(mx-3,my-3,3,mx,my,20);
  mf.addColorStop(0,'rgba(255,243,205,0.96)');mf.addColorStop(0.7,'rgba(230,210,155,0.88)');mf.addColorStop(1,'rgba(195,160,70,0.55)');
  x.fillStyle=mf;x.shadowColor='rgba(235,215,150,0.65)';x.shadowBlur=28;x.fill();x.shadowBlur=0;
  for(var i=0;i<stars.length;i++){var s=stars[i];var tw=Math.sin(fr*s.sp+s.of)*0.28+0.72;x.beginPath();x.arc(s.px*W,s.py*H,s.r,0,6.28);x.fillStyle='rgba(255,248,215,'+(s.a*tw)+')';x.fill();}
  for(var j=0;j<bugs.length;j++){
    var b=bugs[j];b.li+=b.sp;
    if(b.li>1){b.li=0;b.bx=Math.random();b.by=0.35+Math.random()*0.4;b.vx=(Math.random()-0.5)*0.0006;b.vy=-(Math.random()*0.0004+0.0001);}
    var t=b.li,ba=t<0.3?(t/0.3)*b.ma:t>0.7?((1-t)/0.3)*b.ma:b.ma;
    b.bx+=b.vx;b.by+=b.vy;
    var bx=b.bx*W,by=b.by*H;
    var bg=x.createRadialGradient(bx,by,0,bx,by,b.r*5);
    bg.addColorStop(0,'rgba(228,198,118,'+ba+')');bg.addColorStop(1,'transparent');
    x.fillStyle=bg;x.beginPath();x.arc(bx,by,b.r*5,0,6.28);x.fill();
    x.beginPath();x.arc(bx,by,b.r,0,6.28);x.fillStyle='rgba(255,238,175,'+(ba*1.6)+')';x.fill();
  }
  fr++;requestAnimationFrame(draw);
}
draw();
function show(id,delay,props){
  setTimeout(function(){
    var el=document.getElementById(id);
    el.style.opacity='1';
    if(props)for(var k in props)el.style[k]=props[k];
  },delay);
}
show('forest',400,{transform:'translateY(0)'});
show('ms1',1000);show('ms2',1400);show('ms3',1800);
show('o1',1200,{transform:'translateY(0)'});
show('title',1700,{transform:'translateY(0)',filter:'blur(0)'});
show('subtitle',2400,{transform:'translateY(0)'});
show('o2',2100,{transform:'translateY(0)'});
show('card',2900,{transform:'translateY(0)'});
show('btns',3400,{transform:'translateY(0)'});
show('addr',3800);
</script>
</body>
</html>
