<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>特富野餐廳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-pale: #F5E6C0;
    --dark: #1A1208;
    --forest: #0E1A0A;
    --brown: #3D2B10;
    --cream: #FAF3E0;
    --mist: rgba(255,255,255,0.04);
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--forest); }
  #bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
  .scene { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }
  .forest-bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 45vh; z-index: 2; opacity: 0; transform: translateY(20px); animation: riseForest 1.8s 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
  @keyframes riseForest { to { opacity: 1; transform: translateY(0); } }
  .mist-layer { position: fixed; left: -20%; width: 140%; height: 180px; z-index: 3; border-radius: 50%; background: radial-gradient(ellipse at center, rgba(220,210,190,0.12) 0%, transparent 70%); filter: blur(30px); opacity: 0; }
  .mist-1 { bottom: 28vh; animation: mistFloat 3s 1.2s ease forwards, driftSlow 12s 4s ease-in-out infinite alternate; }
  .mist-2 { bottom: 20vh; width: 160%; left: -30%; animation: mistFloat 3s 1.8s ease forwards, driftSlow2 15s 5s ease-in-out infinite alternate; }
  .mist-3 { bottom: 12vh; animation: mistFloat 3s 2.2s ease forwards, driftSlow 18s 6s ease-in-out infinite alternate-reverse; }
  @keyframes mistFloat { to { opacity: 1; } }
  @keyframes driftSlow { to { transform: translateX(8%); } }
  @keyframes driftSlow2 { to { transform: translateX(-6%); } }
  .logo-wrap { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 0; margin-bottom: 6vh; }
  .diamond-ornament { display: flex; align-items: center; gap: 10px; opacity: 0; animation: fadeSlideDown 0.9s 1.4s cubic-bezier(0.22,1,0.36,1) forwards; }
  .diamond-line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .diamond-line.right { background: linear-gradient(90deg, var(--gold), transparent); }
  .diamond-dot { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 8px var(--gold-light); }
  .name-zh { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: clamp(2.6rem, 11vw, 4rem); letter-spacing: 0.25em; color: var(--gold-pale); text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 2px 20px rgba(0,0,0,0.8); opacity: 0; animation: glowReveal 1.2s 1.8s cubic-bezier(0.22,1,0.36,1) forwards; }
  .name-en { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: clamp(0.85rem, 3.5vw, 1.1rem); letter-spacing: 0.2em; color: var(--gold); opacity: 0; animation: fadeSlideUp 0.9s 2.6s cubic-bezier(0.22,1,0.36,1) forwards; margin-top: 4px; }
  .diamond-ornament.bot { margin-top: 6px; animation-delay: 2.2s; }
  .info-card { position: relative; z-index: 10; width: 88%; max-width: 360px; background: rgba(20,12,4,0.72); border: 1px solid rgba(201,168,76,0.25); border-radius: 2px; padding: 22px 26px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); opacity: 0; animation: fadeSlideUp 1s 3s cubic-bezier(0.22,1,0.36,1) forwards; }
  .info-card::before, .info-card::after { content: ''; position: absolute; width: 12px; height: 12px; border-color: var(--gold); border-style: solid; opacity: 0.6; }
  .info-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .info-card::after { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
  .info-row { display: flex; align-items: baseline; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(201,168,76,0.1); }
  .info-row:last-child { border-bottom: none; padding-bottom: 0; }
  .info-row:first-child { padding-top: 0; }
  .info-icon { font-size: 1rem; flex-shrink: 0; width: 20px; text-align: center; }
  .info-text { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: clamp(0.82rem, 3.5vw, 0.95rem); color: var(--cream); letter-spacing: 0.06em; line-height: 1.5; }
  .info-text em { font-style: normal; color: var(--gold-light); font-weight: 400; }
  .cta-wrap { position: relative; z-index: 10; width: 88%; max-width: 360px; display: flex; gap: 10px; margin-top: 16px; opacity: 0; animation: fadeSlideUp 0.9s 3.5s cubic-bezier(0.22,1,0.36,1) forwards; }
  .btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px; padding: 14px 10px; border-radius: 2px; font-family: 'Noto Serif TC', serif; font-weight: 400; font-size: clamp(0.82rem, 3.5vw, 0.92rem); letter-spacing: 0.1em; text-decoration: none; cursor: pointer; transition: all 0.25s ease; border: none; -webkit-tap-highlight-color: transparent; }
  .btn-gold { background: linear-gradient(135deg, var(--gold) 0%, #A87B2A 100%); color: var(--dark); box-shadow: 0 4px 20px rgba(201,168,76,0.3); }
  .btn-gold:active { transform: scale(0.97); }
  .btn-outline { background: transparent; border: 1px solid rgba(201,168,76,0.45); color: var(--gold-light); }
  .btn-outline:active { transform: scale(0.97); background: rgba(201,168,76,0.08); }
  .tagline { position: relative; z-index: 10; font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: clamp(0.7rem, 3vw, 0.8rem); color: rgba(201,168,76,0.55); letter-spacing: 0.2em; margin-top: 18px; opacity: 0; animation: fadeSlideUp 0.9s 4s cubic-bezier(0.22,1,0.36,1) forwards; }
  @keyframes glowReveal { 0% { opacity: 0; filter: blur(8px); transform: translateY(6px); } 100% { opacity: 1; filter: blur(0); transform: translateY(0); } }
  @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="mist-layer mist-1"></div>
<div class="mist-layer mist-2"></div>
<div class="mist-layer mist-3"></div>
