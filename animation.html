<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特富野餐廳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #0d0b08;
    --deep: #1a1510;
    --cream: #f0e8d8;
  }
  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fireflies { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .firefly {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--gold-light);
    box-shadow: 0 0 6px 2px rgba(201,168,76,0.6);
    animation: float var(--dur) ease-in-out infinite, twinkle var(--twinkle) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes float {
    0%   { transform: translate(0, 0); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 0.7; }
    100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
  }
  @keyframes twinkle {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.8); }
  }
  .mountains {
    position: fixed; bottom: 0; left: 0;
    width: 100%; height: 45vh;
    z-index: 1; opacity: 0;
    animation: fadeUp 2s ease 0.5s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .mist {
    position: fixed; bottom: 30vh; left: -50%;
    width: 200%; height: 80px;
    border-radius: 50%; z-index: 2; opacity: 0;
    animation: mistIn 3s ease 1.5s forwards, drift var(--speed) ease-in-out infinite alternate;
  }
  .mist-1 { background: radial-gradient(ellipse, rgba(240,232,216,0.08) 0%, transparent 70%); --speed: 12s; bottom: 32vh; }
  .mist-2 { background: radial-gradient(ellipse, rgba(240,232,216,0.06) 0%, transparent 70%); --speed: 18s; animation-delay: 2s, 3s; bottom: 26vh; height: 60px; }
  @keyframes mistIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes drift { from { transform: translateX(-3%); } to { transform: translateX(3%); } }
  .card { position: relative; z-index: 10; text-align: center; padding: 3rem 2.5rem; }
  .ornament { display: flex; align-items: center; justify-content: center; gap: 0.8rem; margin-bottom: 1.6rem; opacity: 0; animation: fadeIn 1s ease 1s forwards; }
  .ornament-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .ornament-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .name-wrap { overflow: hidden; margin-bottom: 0.3rem; }
  .restaurant-name {
    font-size: clamp(2.8rem, 10vw, 5rem);
    font-weight: 300; letter-spacing: 0.25em;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
    display: block;
    transform: translateY(100%);
    animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards, glow 4s ease-in-out 2s infinite;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes glow {
    0%, 100% { text-shadow: 0 0 30px rgba(201,168,76,0.2); }
    50%       { text-shadow: 0 0 60px rgba(201,168,76,0.5), 0 0 100px rgba(201,168,76,0.15); }
  }
  .subtitle { font-size: clamp(0.7rem, 2vw, 0.85rem); letter-spacing: 0.4em; color: rgba(240,232,216,0.5); margin-top: 0.5rem; opacity: 0; animation: fadeIn 1s ease 1.4s forwards; }
  .divider { margin: 1.8rem auto; width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold) 40%, var(--gold) 60%, transparent); opacity: 0; animation: fadeIn 1s ease 1.8s forwards; }
  .info-line { font-size: clamp(0.75rem, 2vw, 0.88rem); letter-spacing: 0.15em; color: rgba(240,232,216,0.7); line-height: 2; opacity: 0; }
  .info-line:nth-child(1) { animation: fadeIn 0.8s ease 2.1s forwards; }
  .info-line:nth-child(2) { animation: fadeIn 0.8s ease 2.4s forwards; }
  .info-line:nth-child(3) { animation: fadeIn 0.8s ease 2.7s forwards; }
  .info-line .icon { display: inline-block; color: var(--gold); margin-right: 0.4rem; font-style: normal; }
  .tag { margin-top: 2rem; display: inline-block; border: 1px solid rgba(201,168,76,0.35); padding: 0.4rem 1.2rem; font-size: 0.7rem; letter-spacing: 0.3em; color: var(--gold); opacity: 0; animation: fadeIn 1s ease 3.1s forwards; }
</style>
</head>
<body>
<div class="fireflies" id="fireflies"></div>
<svg class="mountains" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="m1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2015" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>
    <linearGradient id="m2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1510" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>
  </defs>
  <polygon points="0,400 0,220 150,100 300,180 450,80 600,160 750,60 900,140 1050,90 1200,160 1200,400" fill="url(#m1)"/>
  <polygon points="0,400 0,300 100,200 250,280 400,170 550,260 700,150 850,240 1000,180 1200,250 1200,400" fill="url(#m2)"/>
  <g fill="#0d0b08">
    <rect x="0" y="320" width="1200" height="80"/>
    <polygon points="30,320 50,280 70,320"/><polygon points="60,320 85,265 110,320"/>
    <polygon points="100,320 120,285 140,320"/><polygon points="200,320 220,275 240,320"/>
    <polygon points="230,320 255,260 280,320"/><polygon points="350,320 370,270 390,320"/>
    <polygon points="500,320 525,255 550,320"/><polygon points="540,320 560,280 580,320"/>
    <polygon points="700,320 720,265 740,320"/><polygon points="730,320 755,250 780,320"/>
    <polygon points="850,320 875,270 900,320"/><polygon points="1000,320 1020,260 1040,320"/>
    <polygon points="1050,320 1075,275 1100,320"/><polygon points="1130,320 1150,285 1170,320"/>
  </g>
</svg>
<div class="mist mist-1"></div>
<div class="mist mist-2"></div>
<div class="card">
  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line"></div>
  </div>
  <div class="name-wrap">
    <span class="restaurant-name">特富野餐廳</span>
  </div>
  <div class="subtitle">Tfuya Indigenous Cuisine · Alishan</div>
  <div class="divider"></div>
  <div class="info-line"><i class="icon">◆</i>鄒族風味全餐　每位 $500</div>
  <div class="info-line"><i class="icon">◆</i>預約制　電話 0965-622-011</div>
  <div class="info-line"><i class="icon">◆</i>嘉義縣阿里山鄉　特富野部落</div>
  <div class="tag">僅接受預約 · Reservation Only</div>
</div>
<script>
  const container = document.getElementById('fireflies');
  for (let i = 0; i < 30; i++) {
    const f = document.createElement('div');
    f.className = 'firefly';
    f.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*80}%;--dur:${6+Math.random()*10}s;--twinkle:${2+Math.random()*4}s;--dx:${(Math.random()-0.5)*120}px;--dy:${-40-Math.random()*80}px;animation-delay:${Math.random()*8}s;`;
    container.appendChild(f);
  }
</script>
</body>
</html>
